services:
  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logisticsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistics_network
  
  web:
    build: .
    command: >
        sh -c "cd logisticsapi &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=1
    depends_on:
      - postgres
    networks:
      - logistics_network

volumes:
  postgres_data:

networks:
  logistics_network:
    driver: bridge